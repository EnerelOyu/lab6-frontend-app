<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .profile-avatar-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
        }

        .avatar-wrapper {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            overflow: hidden;
            background: #e5e7eb;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            border: 3px solid #d0d7de;
        }

        .avatar-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .avatar-placeholder {
            font-size: 36px;
            color: #9ca3af;
        }

        .upload-label {
            display: inline-block;
            padding: 8px 16px;
            background: #f3f4f6;
            border: 1px solid #d0d7de;
            border-radius: 8px;
            font-size: 13px;
            color: #374151;
            cursor: pointer;
            margin-bottom: 6px;
        }

        .upload-label:hover {
            background: #e5e7eb;
        }

        #profileImage {
            display: none;
        }

        .upload-btn {
            width: auto;
            padding: 8px 20px;
            font-size: 13px;
            margin-top: 6px;
            background: #2563eb;
        }

        .readonly-field {
            background: #f9fafb;
            color: #6b7280;
        }

        .section-divider {
            border: none;
            border-top: 1px solid #e5e7eb;
            margin: 16px 0;
        }

        .token-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 20px;
            margin-bottom: 16px;
        }

        .token-badge.success {
            background: #dcfce7;
            color: #166534;
        }

        .token-badge.error {
            background: #fee2e2;
            color: #991b1b;
        }
    </style>
</head>
<body>
<div class="page">
    <div class="container">
        <h2>Profile</h2>

        <div id="tokenStatus" class="token-badge success">&#10003; Token loaded</div>

        <!-- Avatar -->
        <div class="profile-avatar-section">
            <div class="avatar-wrapper">
                <img id="imagePreview" src="" alt="Profile Image">
                <span class="avatar-placeholder" id="avatarPlaceholder">&#128100;</span>
            </div>

            <label class="upload-label" for="profileImage">Зураг сонгох</label>
            <input type="file" id="profileImage" accept="image/*">
            <button class="upload-btn" type="button" onclick="uploadImage()">Upload</button>
        </div>

        <input type="hidden" id="imageUrl">

        <hr class="section-divider">

        <label for="id">ID</label>
        <input class="readonly-field" type="number" id="id" placeholder="ID" readonly>

        <label for="username">Username</label>
        <input class="readonly-field" type="text" id="username" placeholder="Username" readonly>

        <label for="name">Name</label>
        <input type="text" id="name" placeholder="Name">

        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Email">

        <label for="bio">Bio</label>
        <textarea id="bio" placeholder="Bio"></textarea>

        <label for="phone">Phone</label>
        <input type="text" id="phone" placeholder="Phone">

        <div class="button-row">
            <button onclick="updateUser()">Profile шинэчлэх</button>
            <button class="secondary-btn" onclick="logout()">Logout</button>
        </div>

        <div id="message"></div>
        <div id="result" class="info-box" style="display: none;"></div>
    </div>
</div>

<script>
const API_URL = "http://168.144.105.105:8080/users";
const FILE_API_URL = "http://168.144.105.105:8080/files/upload";

function getToken() {
    return localStorage.getItem("token");
}

function getUserId() {
    return localStorage.getItem("userId");
}

function showMessage(text, type) {
    const el = document.getElementById("message");
    el.className = "message " + type;
    el.textContent = text;
}

function showResult(text) {
    document.getElementById("result").textContent=text;
}

function updateTokenStatus() {
    const tokenStatus = document.getElementById("tokenStatus");
    if (getToken()) {
        tokenStatus.className = "token-badge success";
        tokenStatus.textContent = "✓ Token loaded";
    } else {
        tokenStatus.className = "token-badge error";
        tokenStatus.textContent = "Token байхгүй. Login хийнэ үү.";
    }
}

function getHeaders(withJson = false) {
    const headers = {
        "Authorization": "Bearer " + getToken()
    };

    if (withJson) {
        headers["Content-Type"] = "application/json";
    }

    return headers;
}

function getFormData() {
    return {
        username: document.getElementById("username").value,
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        bio: document.getElementById("bio").value,
        phone: document.getElementById("phone").value,
        imageUrl: document.getElementById("imageUrl").value
    };
}

function setAvatarPreview(url) {
    const preview = document.getElementById("imagePreview");
    const placeholder = document.getElementById("avatarPlaceholder");
    if (url) {
        preview.src = url;
        preview.style.display = "block";
        placeholder.style.display = "none";
    } else {
        preview.src = "";
        preview.style.display = "none";
        placeholder.style.display = "block";
    }
}

async function uploadImage() {
    try {
        const fileInput = document.getElementById("profileImage");
        const file = fileInput.files[0];

        if (!file) {
            showMessage("Эхлээд зураг сонгоно уу.", "error");
            return;
        }

        showMessage("Зураг upload хийж байна...", "info");

        const formData = new FormData();
        formData.append("file", file);

        const uploadResponse = await fetch(
            "http://168.144.105.105:8080/files/upload",
            {
                method: "POST",
                body: formData
            }
        );

        const uploadData = await uploadResponse.json();

        if (!uploadResponse.ok || !uploadData.success) {
            showMessage("Зураг upload хийхэд алдаа гарлаа.", "error");
            return;
        }

        const imageUrl = uploadData.url;

        document.getElementById("imageUrl").value = imageUrl;
        setAvatarPreview(imageUrl);

        const userId = getUserId();
        if (userId) {
            await fetch("http://168.144.105.105:8080/mail/uploaded-notif", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ to: userId })
            });
        }

        showMessage("Зураг амжилттай upload хийгдлээ. Одоо Profile шинэчлэх дарна уу.", "success");
    } catch (error) {
        console.error(error);
        showMessage("Upload хийх үед алдаа гарлаа.", "error");
    }
}

async function loadMyProfile() {
    try {
        const userId = getUserId();

        if (!userId) {
            showMessage("userId олдсонгүй. Дахин login хийнэ үү.", "error");
            return;
        }

        const response = await fetch(`${API_URL}/${userId}`, {
            method: "GET",
            headers: getHeaders(false)
        });

        if (!response.ok) {
            showMessage("Profile олдсонгүй.", "error");
            return;
        }

        const user = await response.json();

        document.getElementById("imageUrl").value = user.imageUrl || "";
        setAvatarPreview(user.imageUrl);

        document.getElementById("id").value = user.id || "";
        document.getElementById("username").value = user.username || "";
        document.getElementById("name").value = user.name || "";
        document.getElementById("email").value = user.email || "";
        document.getElementById("bio").value = user.bio || "";
        document.getElementById("phone").value = user.phone || "";

        showMessage("Profile амжилттай ачаалагдлаа.", "success");
        showResult(JSON.stringify(user, null, 2));
    } catch (error) {
        showMessage("Profile ачаалах үед алдаа гарлаа.", "error");
    }
}

async function updateUser() {
    try {
        const userId = getUserId();

        if (!userId) {
            showMessage("userId олдсонгүй. Дахин login хийнэ үү.", "error");
            return;
        }

        const user = getFormData();

        const response = await fetch(`${API_URL}/${userId}`, {
            method: "PUT",
            headers: getHeaders(true),
            body: JSON.stringify(user)
        });

        const text = await response.text();

        if (response.ok) {
            showMessage("Profile амжилттай шинэчлэгдлээ.", "success");
            showResult(text);
            loadMyProfile();
        } else {
            showMessage("Profile шинэчлэх үед алдаа гарлаа.", "error");
            showResult(text);
        }
    } catch (error) {
        showMessage("Update request амжилтгүй боллоо.", "error");
    }
}

function logout() {
    localStorage.removeItem("token");
    localStorage.removeItem("userId");
    window.location.href = "index.html";
}

if (!getToken()) {
    window.location.href = "index.html";
} else {
    updateTokenStatus();
    loadMyProfile();
}
</script>
</body>
</html>
