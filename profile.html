<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="page">
    <div class="container">
        <h2>Profile</h2>
        <div id="tokenStatus" class="message success">Token loaded</div>

        <label for="id">ID</label>
        <input type="number" id="id" placeholder="ID" readonly>

        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Username" readonly>

        <label for="name">Name</label>
        <input type="text" id="name" placeholder="Name">

        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Email">

        <label for="bio">Bio</label>
        <textarea id="bio" placeholder="Bio"></textarea>

        <label for="phone">Phone</label>
        <input type="text" id="phone" placeholder="Phone">

        <div class="button-row">
            <button onclick="updateUser()">Profile шинэчлэх</button>
            <button class="secondary-btn" onclick="logout()">Logout</button>
        </div>

        <div id="message"></div>
        <div id="result" class="info-box" style="display: none;"></div>
    </div>
</div>

<script>
const API_URL = "https://user-json-service-4svlc.ondigitalocean.app/users";

function getToken() {
    return localStorage.getItem("token");
}

function getUserId() {
    return localStorage.getItem("userId");
}

function showMessage(text, type) {
    const el = document.getElementById("message");
    el.className = "message " + type;
    el.textContent = text;
}

function showResult(text) {
    document.getElementById("result").textContent=text;
}

function updateTokenStatus() {
    const tokenStatus = document.getElementById("tokenStatus");
    if (getToken()) {
        tokenStatus.className = "message success";
        tokenStatus.textContent = "Token loaded";
    } else {
        tokenStatus.className = "message error";
        tokenStatus.textContent = "Token байхгүй. Login хийнэ үү.";
    }
}

function getHeaders(withJson = false) {
    const headers = {
        "Authorization": "Bearer " + getToken()
    };

    if (withJson) {
        headers["Content-Type"] = "application/json";
    }

    return headers;
}

function getFormData() {
    return {
        username: document.getElementById("username").value,
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        bio: document.getElementById("bio").value,
        phone: document.getElementById("phone").value
    };
}

async function loadMyProfile() {
    try {
        const userId = getUserId();

        if (!userId) {
            showMessage("userId олдсонгүй. Дахин login хийнэ үү.", "error");
            return;
        }

        const response = await fetch(`${API_URL}/${userId}`, {
            method: "GET",
            headers: getHeaders(false)
        });

        if (!response.ok) {
            showMessage("Profile олдсонгүй.", "error");
            return;
        }

        const user = await response.json();

        document.getElementById("id").value = user.id || "";
        document.getElementById("username").value = user.username || "";
        document.getElementById("name").value = user.name || "";
        document.getElementById("email").value = user.email || "";
        document.getElementById("bio").value = user.bio || "";
        document.getElementById("phone").value = user.phone || "";

        showMessage("Profile амжилттай ачаалагдлаа.", "success");
        showResult(JSON.stringify(user, null, 2));
    } catch (error) {
        showMessage("Profile ачаалах үед алдаа гарлаа.", "error");
    }
}

async function updateUser() {
    try {
        const userId = getUserId();

        if (!userId) {
            showMessage("userId олдсонгүй. Дахин login хийнэ үү.", "error");
            return;
        }

        const user = getFormData();

        const response = await fetch(`${API_URL}/${userId}`, {
            method: "PUT",
            headers: getHeaders(true),
            body: JSON.stringify(user)
        });

        const text = await response.text();

        if (response.ok) {
            showMessage("Profile амжилттай шинэчлэгдлээ.", "success");
            showResult(text);
            loadMyProfile();
        } else {
            showMessage("Profile шинэчлэх үед алдаа гарлаа.", "error");
            showResult(text);
        }
    } catch (error) {
        showMessage("Update request амжилтгүй боллоо.", "error");
    }
}

function logout() {
    localStorage.removeItem("token");
    localStorage.removeItem("userId");
    window.location.href = "login.html";
}

if (!getToken()) {
    window.location.href = "login.html";
} else {
    updateTokenStatus();
    loadMyProfile();
}
</script>
</body>
</html>
