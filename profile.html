<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="page">
    <div class="container">
        <h2>Profile</h2>
        <div id="tokenStatus" class="message success">Token loaded</div>

        <label for="id">ID</label>
        <input type="number" id="id" placeholder="ID">

        <label for="name">Name</label>
        <input type="text" id="name" placeholder="Name">

        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Email">

        <label for="bio">Bio</label>
        <textarea id="bio" placeholder="Bio"></textarea>

        <label for="phone">Phone</label>
        <input type="text" id="phone" placeholder="Phone">

        <div class="button-row">
            <button onclick="createUser()">Profile үүсгэх</button>
            <button onclick="updateUser()">Profile шинэчлэх</button>
        </div>

        <button class="secondary-btn" onclick="logout()">Logout</button>

        <div id="message"></div>

        <div id="result" class="info-box">Энд үр дүн харагдана.</div>
    </div>
</div>

<script>
const API_URL = "http://localhost:8081/users";

function getToken() {
    return localStorage.getItem("token");
}

function showMessage(text, type) {
    const el = document.getElementById("message");
    el.className = "message " + type;
    el.textContent = text;
}

function showResult(text) {
    document.getElementById("result").textContent = text;
}

function updateTokenStatus() {
    const tokenStatus = document.getElementById("tokenStatus");
    if (getToken()) {
        tokenStatus.className = "message success";
        tokenStatus.textContent = "Token loaded";
    } else {
        tokenStatus.className = "message error";
        tokenStatus.textContent = "Token байхгүй. Login хийнэ үү.";
    }
}

function getHeaders(withJson = false) {
    const headers = {
        "Authorization": "Bearer " + getToken()
    };

    if (withJson) {
        headers["Content-Type"] = "application/json";
    }

    return headers;
}

function getFormData() {
    return {
        id: parseInt(document.getElementById("id").value),
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        bio: document.getElementById("bio").value,
        phone: document.getElementById("phone").value
    };
}

async function createUser() {
    try {
        const user = getFormData();

        const response = await fetch(API_URL, {
            method: "POST",
            headers: getHeaders(true),
            body: JSON.stringify(user)
        });

        const text = await response.text();

        if (response.ok) {
            showMessage("Profile амжилттай үүслээ.", "success");
        } else {
            showMessage("Profile үүсгэх үед алдаа гарлаа.", "error");
        }

        showResult(text);
    } catch (error) {
        showMessage("Create request амжилтгүй боллоо.", "error");
    }
}

async function getUser() {
    try {
        const id = document.getElementById("id").value;

        const response = await fetch(`${API_URL}/${id}`, {
            method: "GET",
            headers: getHeaders(false)
        });

        const text = await response.text();

        if (response.ok) {
            showMessage("Profile амжилттай уншигдлаа.", "success");
        } else {
            showMessage("Profile олдсонгүй эсвэл алдаа гарлаа.", "error");
        }

        showResult(text);
    } catch (error) {
        showMessage("Get request амжилтгүй боллоо.", "error");
    }
}

async function updateUser() {
    try {
        const id = document.getElementById("id").value;
        const user = getFormData();

        const response = await fetch(`${API_URL}/${id}`, {
            method: "PUT",
            headers: getHeaders(true),
            body: JSON.stringify(user)
        });

        const text = await response.text();

        if (response.ok) {
            showMessage("Profile амжилттай шинэчлэгдлээ.", "success");
        } else {
            showMessage("Profile шинэчлэх үед алдаа гарлаа.", "error");
        }

        showResult(text);
    } catch (error) {
        showMessage("Update request амжилтгүй боллоо.", "error");
    }
}

async function deleteUser() {
    try {
        const id = document.getElementById("id").value;

        const response = await fetch(`${API_URL}/${id}`, {
            method: "DELETE",
            headers: getHeaders(false)
        });

        const text = await response.text();

        if (response.ok) {
            showMessage("Profile амжилттай устлаа.", "success");
        } else {
            showMessage("Profile устгах үед алдаа гарлаа.", "error");
        }

        showResult(text);
    } catch (error) {
        showMessage("Delete request амжилтгүй боллоо.", "error");
    }
}

function logout() {
    localStorage.removeItem("token");
    window.location.href = "login.html";
}

if (!getToken()) {
    window.location.href = "login.html";
} else {
    updateTokenStatus();
}
</script>
</body>
</html>
