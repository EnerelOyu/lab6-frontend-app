<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="page">
    <div class="container">
        <h2>Register</h2>
        <p>Шинэ хэрэглэгчээр бүртгүүлэх</p>

        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Username">

        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Password">

        <label for="name">Name</label>
        <input type="text" id="name" placeholder="Name">

        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Email">

        <label for="bio">Bio</label>
        <input type="text" id="bio" placeholder="Bio">

        <label for="phone">Phone</label>
        <input type="text" id="phone" placeholder="Phone">

        <button onclick="registerUser()">Register</button>

        <div id="message"></div>

        <div class="link-area">
            <a href="login.html">Login</a>
        </div>
    </div>
</div>

<script>
function showMessage(text, type) {
    const el = document.getElementById("message");
    el.className = "message " + type;
    el.textContent = text;
}

async function registerUser() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const bio = document.getElementById("bio").value.trim();
    const phone = document.getElementById("phone").value.trim();

    if (!username || !password || !name) {
        showMessage("Username, password, name оруулна уу.", "error");
        return;
    }

    try {
        const response = await fetch("https://user-json-service-4svlc.ondigitalocean.app/auth/register", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                username,
                password,
                name,
                email,
                bio,
                phone
            })
        });

        if (!response.ok) {
            const errorText = await response.text();
            showMessage("Бүртгүүлэх үед алдаа гарлаа: " + errorText, "error");
            return;
        }

        const result = await response.json();

        localStorage.setItem("token", result.token);
        localStorage.setItem("userId", result.userId);

        showMessage(`Амжилттай бүртгэгдлээ. Generated ID: ${result.userId}`, "success");

        setTimeout(() => {
            window.location.href = "profile.html";
        }, 1000);

    } catch (error) {
        console.error(error);
        showMessage("Сервертэй холбогдох үед алдаа гарлаа.", "error");
    }
}
</script>
</body>
</html>
