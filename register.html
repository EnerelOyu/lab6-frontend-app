<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0 14px;
        }

        .form-row .field {
            display: flex;
            flex-direction: column;
        }

        .form-row label {
            margin-top: 12px;
        }

        .required-mark {
            color: #dc2626;
            margin-left: 2px;
        }

        .register-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .register-header h2 {
            margin-bottom: 4px;
        }

        .register-header p {
            margin: 0;
            font-size: 14px;
        }

        .submit-btn {
            margin-top: 16px;
        }
    </style>
</head>
<body>
<div class="page">
    <div class="container">
        <div class="register-header">
            <h2>Register</h2>
            <p>Шинэ хэрэглэгчээр бүртгүүлэх</p>
        </div>

        <div class="form-row">
            <div class="field">
                <label for="username">Username <span class="required-mark">*</span></label>
                <input type="text" id="username" placeholder="Username">
            </div>
            <div class="field">
                <label for="password">Password <span class="required-mark">*</span></label>
                <input type="password" id="password" placeholder="Password">
            </div>
        </div>

        <label for="name">Name <span class="required-mark">*</span></label>
        <input type="text" id="name" placeholder="Name">

        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Email">

        <label for="bio">Bio</label>
        <input type="text" id="bio" placeholder="Bio">

        <label for="phone">Phone</label>
        <input type="text" id="phone" placeholder="Phone">

        <button class="submit-btn" onclick="registerUser()">Бүртгүүлэх</button>

        <div id="message"></div>

        <div class="link-area">
            Бүртгэлтэй юу? <a href="index.html">Нэвтрэх</a>
        </div>
    </div>
</div>

<script>
function showMessage(text, type) {
    const el = document.getElementById("message");
    el.className = "message " + type;
    el.textContent = text;
}

async function registerUser() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const bio = document.getElementById("bio").value.trim();
    const phone = document.getElementById("phone").value.trim();

    if (!username || !password || !name) {
        showMessage("Username, password, name оруулна уу.", "error");
        return;
    }

    try {
        const response = await fetch("http://168.144.105.105:8080/auth/register", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                username,
                password,
                name,
                email,
                bio,
                phone
            })
        });

        if (!response.ok) {
            const errorText = await response.text();
            showMessage("Бүртгүүлэх үед алдаа гарлаа: " + errorText, "error");
            return;
        }

        const result = await response.json();

        localStorage.setItem("token", result.token);
        localStorage.setItem("userId", result.userId);

        showMessage(`Амжилттай бүртгэгдлээ. Generated ID: ${result.userId}`, "success");

        setTimeout(() => {
            window.location.href = "profile.html";
        }, 1000);

    } catch (error) {
        console.error(error);
        showMessage("Сервертэй холбогдох үед алдаа гарлаа.", "error");
    }
}
</script>
</body>
</html>
