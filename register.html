<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="page">
    <div class="container">
        <h2>Register</h2>
        <p>Шинэ хэрэглэгчээр бүртгүүлэх</p>

        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Username">

        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Password">

        <label for="name">Name</label>
        <input type="text" id="name" placeholder="Name">

        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Email">

        <label for="bio">Bio</label>
        <input type="text" id="bio" placeholder="Bio">

        <label for="phone">Phone</label>
        <input type="text" id="phone" placeholder="Phone">

        <button onclick="registerUser()">Register</button>

        <div id="message"></div>

        <div class="link-area">
            <a href="login.html">Login</a>
        </div>
    </div>
</div>

<script>
function getXmlTagValue(xmlText, tagName) {
    const parser = new DOMParser();
    const xmlDoc = parser.parseFromString(xmlText, "text/xml");

    const tag =
        xmlDoc.getElementsByTagName("ns2:" + tagName)[0] ||
        xmlDoc.getElementsByTagName(tagName)[0];

    return tag ? tag.textContent : null;
}

function showMessage(text, type) {
    const el = document.getElementById("message");
    el.className = "message " + type;
    el.textContent = text;
}

async function registerUser() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const bio = document.getElementById("bio").value.trim();
    const phone = document.getElementById("phone").value.trim();

    if (!username || !password || !name) {
        showMessage("Username, password, name оруулна уу.", "error");
        return;
    }

    const registerSoapBody = `
<soapenv:Envelope xmlns:soapenv="http://schemas.xmlsoap.org/soap/envelope/"
                  xmlns:auth="http://example.com/usersoapservice/auth">
   <soapenv:Header/>
   <soapenv:Body>
      <auth:RegisterUserRequest>
         <auth:username>${username}</auth:username>
         <auth:password>${password}</auth:password>
      </auth:RegisterUserRequest>
   </soapenv:Body>
</soapenv:Envelope>`;

    const loginSoapBody = `
<soapenv:Envelope xmlns:soapenv="http://schemas.xmlsoap.org/soap/envelope/"
                  xmlns:auth="http://example.com/usersoapservice/auth">
   <soapenv:Header/>
   <soapenv:Body>
      <auth:LoginUserRequest>
         <auth:username>${username}</auth:username>
         <auth:password>${password}</auth:password>
      </auth:LoginUserRequest>
   </soapenv:Body>
</soapenv:Envelope>`;

    try {
        // SOAP register
        const soapRegisterResponse = await fetch("http://157.245.49.6:8080/ws", {
            method: "POST",
            headers: {
                "Content-Type": "text/xml;charset=UTF-8"
            },
            body: registerSoapBody
        });

        const soapRegisterText = await soapRegisterResponse.text();
        const registerSuccess = getXmlTagValue(soapRegisterText, "success");
        const registerMessage = getXmlTagValue(soapRegisterText, "message");

        if (registerSuccess !== "true") {
            showMessage(registerMessage || "SOAP бүртгэл амжилтгүй.", "error");
            return;
        }

        // SOAP login -> token авах
        const soapLoginResponse = await fetch("http://157.245.49.6:8080/ws", {
            method: "POST",
            headers: {
                "Content-Type": "text/xml;charset=UTF-8"
            },
            body: loginSoapBody
        });

        const soapLoginText = await soapLoginResponse.text();
        const loginSuccess = getXmlTagValue(soapLoginText, "success");
        const token = getXmlTagValue(soapLoginText, "token");

        if (loginSuccess !== "true" || !token) {
            showMessage("Register амжилттай болсон ч login хийхэд алдаа гарлаа.", "error");
            return;
        }

        // JSON profile create -> generated id
        const jsonResponse = await fetch("https://user-json-service-4svlc.ondigitalocean.app/users", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            },
            body: JSON.stringify({
                username,
                name,
                email,
                bio,
                phone
            })
        });

        if (!jsonResponse.ok) {
            const errorText = await jsonResponse.text();
            showMessage("Profile үүсгэх үед алдаа гарлаа: " + errorText, "error");
            return;
        }

        const savedUser = await jsonResponse.json();
        const userId = savedUser.id;

        // SOAP link profile id
        const linkSoapBody = `
<soapenv:Envelope xmlns:soapenv="http://schemas.xmlsoap.org/soap/envelope/"
                  xmlns:auth="http://example.com/usersoapservice/auth">
   <soapenv:Header/>
   <soapenv:Body>
      <auth:LinkUserProfileRequest>
         <auth:username>${username}</auth:username>
         <auth:userId>${userId}</auth:userId>
      </auth:LinkUserProfileRequest>
   </soapenv:Body>
</soapenv:Envelope>`;

        const linkResponse = await fetch("http://157.245.49.6:8080/ws", {
            method: "POST",
            headers: {
                "Content-Type": "text/xml;charset=UTF-8"
            },
            body: linkSoapBody
        });

        const linkText = await linkResponse.text();
        const linkSuccess = getXmlTagValue(linkText, "success");

        if (linkSuccess !== "true") {
            showMessage("Profile ID холбоход алдаа гарлаа.", "error");
            return;
        }

        // localStorage-д хадгалах
        localStorage.setItem("token", token);
        localStorage.setItem("userId", userId);

        showMessage(`Амжилттай бүртгэгдлээ. Generated ID: ${userId}`, "success");

        setTimeout(() => {
            window.location.href = "profile.html";
        }, 1000);

    } catch (error) {
        showMessage("Сервертэй холбогдох үед алдаа гарлаа.", "error");
        console.error(error);
    }
}
</script>
</body>
</html>
