<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="page">
    <div class="container">
        <h2>Login</h2>
        <p>Нэвтрэх нэр нууц үгээ оруулна уу</p>

        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Username">

        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Password">

        <button onclick="loginUser()">Login</button>

        <div id="message"></div>

        <div class="link-area">
            <a href="register.html">Register</a>
        </div>
    </div>
</div>

<script>
function showMessage(text, type) {
    const el = document.getElementById("message");
    el.className = "message " + type;
    el.textContent = text;
}

async function loginUser() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!username || !password) {
        showMessage("Username болон password оруулна уу.", "error");
        return;
    }

    try {
        const response = await fetch("http://168.144.105.105:8080/auth/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                username,
                password
            })
        });

        if (!response.ok) {
            const errorText = await response.text();
            showMessage(errorText || "Нэвтрэх үед алдаа гарлаа.", "error");
            return;
        }

        const result = await response.json();

        localStorage.setItem("token", result.token);

        if (result.userId) {
            localStorage.setItem("userId", result.userId);
        }

        showMessage("Нэвтрэлт амжилттай.", "success");

        setTimeout(() => {
            window.location.href = "profile.html";
        }, 800);

    } catch (error) {
        console.error(error);
        showMessage("Сервертэй холбогдох үед алдаа гарлаа.", "error");
    }
}
</script>
</body>
</html>
